<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV Charger Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const API_KEY = '__MAPS_API_KEY__';

    function initMap() {
      const center = { lat: 41.19, lng: -111.94 };
      const map = new google.maps.Map(document.getElementById('map'), {
        zoom: 13,
        center: center
      });

      const infoWindow = new google.maps.InfoWindow();

      fetch('station.json')
        .then(res => res.json())
        .then(stations => {
          if (stations.length > 0) {
            const bounds = new google.maps.LatLngBounds();
            stations.forEach(station => {
              const position = { lat: station.lat, lng: station.lng };
              bounds.extend(position);
              const marker = new google.maps.Marker({
                position,
                map,
                title: station.name
              });
              marker.addListener('click', () => {
                infoWindow.setContent(
                  `<strong>${station.name}</strong><br>${station.totalChargers} charger(s)`
                );
                infoWindow.open(map, marker);
              });
            });
            map.fitBounds(bounds);
          }
        })
        .catch(err => console.error('Failed to load stations:', err));
    }
  </script>
  <script>
    const s = document.createElement('script');
    s.async = true;
    s.defer = true;
    s.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&callback=initMap`;
    document.head.appendChild(s);
  </script>
</body>
</html>
